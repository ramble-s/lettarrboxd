  #     # - SONARR_ENABLED=true
  #     # - SONARR_API_URL=http://sonarr:8989
  #     # - SONARR_API_KEY=your_sonarr_api_key
  #     # - SONARR_QUALITY_PROFILE=YOUR_QUALITY_PROFILE
  #   volumes:
